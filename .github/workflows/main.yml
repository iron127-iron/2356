name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & system deps
        run: |
          pip install --upgrade buildozer cython==3.0.11
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev

      - name: Accept Android SDK license
        run: |
          # Create a fake sdkmanager wrapper that auto-accepts licenses
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses 2>/dev/null || true

      - name: Build APK with Buildozer
        run: |
          # Configure git for buildozer
          git config --global user.email "builder@example.com"
          git config --global user.name "Builder"
          # Build
          yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MHDDoS-APK
          path: bin/*.apk
